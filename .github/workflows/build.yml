name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned, Release)
        run: |
          xcodebuild \
            -project Ritoras.xcodeproj \
            -scheme Ritoras \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CURRENT_PROJECT_VERSION=$(git rev-parse --short HEAD) \
            SYMROOT=build

      - name: Verify keyboard Info.plist
        run: |
          PLIST="build/Release-iphoneos/Ritoras.app/PlugIns/RitorasKeyboard.appex/Info.plist"
          echo "=== Keyboard extension Info.plist ==="
          plutil -p "$PLIST"
          echo "=== Key checks ==="
          FAIL=0
          # Check NSExtension exists
          if plutil -extract NSExtension xml1 -o - "$PLIST" &>/dev/null; then
            echo "✅ NSExtension dictionary found"
          else
            echo "❌ NSExtension dictionary MISSING"
            FAIL=1
          fi
          # Check RequestsOpenAccess is true
          if plutil -extract NSExtension.NSExtensionAttributes.RequestsOpenAccess raw -o - "$PLIST" 2>/dev/null | grep -q "true"; then
            echo "✅ RequestsOpenAccess = true"
          else
            echo "❌ RequestsOpenAccess missing or not true (expected under NSExtension.NSExtensionAttributes)"
            FAIL=1
          fi
          # Check NSExtensionPrincipalClass is set
          PRINCIPAL=$(plutil -extract NSExtension.NSExtensionPrincipalClass raw -o - "$PLIST" 2>/dev/null)
          if [ -n "$PRINCIPAL" ] && [ "$PRINCIPAL" != "\$(PRODUCT_MODULE_NAME).KeyboardViewController" ]; then
            echo "✅ NSExtensionPrincipalClass = $PRINCIPAL"
          else
            echo "❌ NSExtensionPrincipalClass missing or unresolved: $PRINCIPAL"
            FAIL=1
          fi
          # Check CFBundleDisplayName
          if plutil -extract CFBundleDisplayName raw -o - "$PLIST" 2>/dev/null | grep -q .; then
            echo "✅ CFBundleDisplayName present"
          else
            echo "❌ CFBundleDisplayName MISSING"
            FAIL=1
          fi
          if [ $FAIL -eq 1 ]; then
            exit 1
          fi

      - name: Package .ipa (unsigned — on-device signing by SideStore)
        run: |
          # Strip any debug/preview dylibs that would be unsigned and crash on device
          find build/Release-iphoneos/Ritoras.app -name "*.debug.dylib" -delete
          find build/Release-iphoneos/Ritoras.app -name "__preview.dylib" -delete
          mkdir -p Payload
          cp -r build/Release-iphoneos/Ritoras.app Payload/
          zip -r Ritoras.ipa Payload/

      - name: Verify .ipa contains keyboard extension
        run: |
          if unzip -l Ritoras.ipa | grep -q "PlugIns/RitorasKeyboard"; then
            echo "✅ Keyboard extension embedded in .ipa"
          else
            echo "❌ Keyboard extension NOT found in .ipa — build is broken (extension not embedded)"
            exit 1
          fi

      - name: Upload .ipa artifact (sideloadable)
        uses: actions/upload-artifact@v4
        with:
          name: Ritoras.ipa
          path: Ritoras.ipa

      - name: Upload .app artifact (debugging)
        uses: actions/upload-artifact@v4
        with:
          name: Ritoras.app
          path: build/Release-iphoneos/Ritoras.app
