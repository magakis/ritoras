name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project Ritoras.xcodeproj \
            -scheme Ritoras \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SYMROOT=build

      - name: Verify keyboard Info.plist contains NSExtension
        run: |
          echo "=== Keyboard extension Info.plist ==="
          cat build/Debug-iphoneos/Ritoras.app/PlugIns/RitorasKeyboard.appex/Info.plist || true
          echo "=== Checking for NSExtension ==="
          if plutil -extract NSExtension xml1 -o - build/Debug-iphoneos/Ritoras.app/PlugIns/RitorasKeyboard.appex/Info.plist 2>/dev/null; then
            echo "✅ NSExtension dictionary found in keyboard extension"
          else
            echo "❌ NSExtension dictionary MISSING from keyboard extension — Info.plist was overwritten"
            echo "Full Info.plist content:"
            cat build/Debug-iphoneos/Ritoras.app/PlugIns/RitorasKeyboard.appex/Info.plist
            exit 1
          fi

      - name: Package .ipa (unsigned — on-device signing by SideStore)
        run: |
          mkdir -p Payload
          cp -r build/Debug-iphoneos/Ritoras.app Payload/
          zip -r Ritoras.ipa Payload/

      - name: Verify .ipa contains keyboard extension
        run: |
          if unzip -l Ritoras.ipa | grep -q "PlugIns/RitorasKeyboard"; then
            echo "✅ Keyboard extension embedded in .ipa"
          else
            echo "❌ Keyboard extension NOT found in .ipa — build is broken (extension not embedded)"
            exit 1
          fi

      - name: Upload .ipa artifact (sideloadable)
        uses: actions/upload-artifact@v4
        with:
          name: Ritoras.ipa
          path: Ritoras.ipa

      - name: Upload .app artifact (debugging)
        uses: actions/upload-artifact@v4
        with:
          name: Ritoras.app
          path: build/Debug-iphoneos/Ritoras.app
