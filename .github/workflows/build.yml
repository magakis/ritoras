name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project Ritoras.xcodeproj \
            -scheme Ritoras \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SYMROOT=build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ritoras.app
          path: build/Debug-iphoneos/Ritoras.app
