name: Ritoras
options:
  bundleIdPrefix: com.ritoras
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: NO

targets:
  Ritoras:
    type: application
    platform: iOS
    sources:
      - path: app
      - path: shared
    dependencies:
      - sdk: libsqlite3.tbd
      - target: RitorasKeyboard
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ritoras.app
        INFOPLIST_FILE: app/Info.plist
        PRODUCT_NAME: Ritoras
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: app/Ritoras.entitlements
        ENABLE_TESTABILITY: YES

  RitorasKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: keyboard
      - path: shared
      - path: third-party/kenlm/kenlm-source
        excludes:
          - "**/*test*"
          - "**/*_test*"
          - "**/builder/**"
          - "**/filter/**"
          - "**/main.cpp"
          - "**/*_main.cc"
          - "**/*_main.cpp"
      - path: keyboard/Sources/Prediction/Trigram/kenlm_c.cpp
    dependencies:
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ritoras.app.keyboard
        INFOPLIST_FILE: keyboard/Info.plist
        PRODUCT_NAME: RitorasKeyboard
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: keyboard/RitorasKeyboard.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: keyboard/RitorasKeyboard-BridgingHeader.h
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        CLANG_CXX_LIBRARY: "libc++"
        GCC_PREPROCESSOR_DEFINITIONS:
          KENLM_MAX_ORDER=6
        USER_HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "third-party/kenlm"
          - "keyboard/Sources/Prediction/Trigram"

  RitorasTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RitorasTests
      - path: keyboard/Sources/Prediction
        excludes:
          - "Resources/"
          - "Autocorrect/AutoCorrectTraits.swift"
      - path: keyboard/Sources/Prediction/Resources
      - path: keyboard/Sources/AutoCapitalization
        excludes:
          - AutoCapTraits.swift
      - path: keyboard/Sources/HapticsManager.swift
      - path: keyboard/Sources/Prediction/Trigram/kenlm_c.cpp
      - path: third-party/kenlm/kenlm-source
        excludes:
          - "**/*test*"
          - "**/*_test*"
          - "**/builder/**"
          - "**/filter/**"
          - "**/main.cpp"
          - "**/*_main.cc"
          - "**/*_main.cpp"
    dependencies:
      - target: Ritoras
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ritoras.app.tests
        PRODUCT_NAME: RitorasTests
        SWIFT_OBJC_BRIDGING_HEADER: keyboard/RitorasKeyboard-BridgingHeader.h
        USER_HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "third-party/kenlm"
          - "keyboard/Sources/Prediction/Trigram"
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        CLANG_CXX_LIBRARY: "libc++"
        GCC_PREPROCESSOR_DEFINITIONS:
          KENLM_MAX_ORDER=6