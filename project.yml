name: Ritoras
options:
  bundleIdPrefix: com.ritoras
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: NO

targets:
  Ritoras:
    type: application
    platform: iOS
    sources:
      - path: app
      - path: shared
    dependencies:
      - target: RitorasKeyboard
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ritoras.app
        INFOPLIST_FILE: app/Info.plist
        PRODUCT_NAME: Ritoras
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: app/Ritoras.entitlements

  RitorasKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: keyboard
      - path: shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ritoras.app.keyboard
        INFOPLIST_FILE: keyboard/Info.plist
        PRODUCT_NAME: RitorasKeyboard
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: keyboard/RitorasKeyboard.entitlements

  RitorasTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RitorasTests
      - path: keyboard/Sources/Prediction
        excludes:
          - "Resources/"
          - "Autocorrect/AutoCorrectTraits.swift"
      - path: keyboard/Sources/Prediction/Resources
      - path: keyboard/Sources/AutoCapitalization
        excludes:
          - AutoCapTraits.swift
      - path: keyboard/Sources/HapticsManager.swift
    dependencies:
      - target: Ritoras
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ritoras.app.tests
        PRODUCT_NAME: RitorasTests