name: Ritoras
options:
  bundleIdPrefix: com.ritoras
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: NO

targets:
  Ritoras:
    type: application
    platform: iOS
    sources:
      - path: app
      - path: shared
    entitlements:
      path: app/Ritoras.entitlements
    dependencies:
      - target: RitorasKeyboard
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ritoras.app
        INFOPLIST_FILE: app/Info.plist
        PRODUCT_NAME: Ritoras
        GENERATE_INFOPLIST_FILE: NO

  RitorasKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: keyboard
      - path: shared
    entitlements:
      path: keyboard/RitorasKeyboard.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ritoras.app.keyboard
        INFOPLIST_FILE: keyboard/Info.plist
        PRODUCT_NAME: RitorasKeyboard
        GENERATE_INFOPLIST_FILE: NO